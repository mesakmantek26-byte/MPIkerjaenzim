        * { margin: 0; padding: 0; box-sizing: border-box; }

        .tab-btn { transition: all 0.3s; background: #374151; color: #d1d5db; border: none; cursor: pointer; }

        .substrate.bound { transform: translateY(0); opacity: 0.9; }
        .product { width: 24px; height: 24px; background: #ef4444; border-radius: 50%; }
        .slider-track { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: #374151; outline: none; }
        .slider-track::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #10b981; cursor: pointer; }
        @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease; }
